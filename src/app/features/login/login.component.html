<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <h1>Kardex Digital</h1>
      </div>
      <p class="subtitle">Sistema de Gestión Académica</p>
    </div>

    <div class="login-body">
      <form (ngSubmit)="onSubmit()">
        <div class="input-group">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            class="form-control"
            [(ngModel)]="username"
            name="username"
            placeholder="Ingrese su usuario"
            autocomplete="off"
            required
          />
          <i class="fas fa-user input-icon"></i>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required
          />
          <i class="fas fa-lock input-icon"></i>
        </div>

        <button type="submit" class="btn-login" [disabled]="loading">
          <i class="fas fa-sign-in-alt" *ngIf="!loading"></i>
          <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
          {{ loading ? "Validando..." : "Iniciar Sesión" }}
        </button>

        <div class="login-links">
          <a href="#"
            ><i class="fas fa-question-circle"></i> ¿Olvidó su contraseña?</a
          >
          <a href="#"><i class="fas fa-headset"></i> Soporte técnico</a>
        </div>
      </form>
    </div>

    <div class="login-footer">
      <p><i class="fas fa-university"></i> Universidad Autónoma Tomás Frías</p>
      <small>Sistema de Gestión de Notas - Gestión Académica</small>
    </div>
  </div>

  <div *ngIf="errorMessage" class="error-toast">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>
</div>
