<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1><i class="fas fa-inbox"></i> Buzón de Reclamos y Sugerencias</h1>
      <p>Sistema de atención al estudiante - Dirección de Carrera</p>
    </div>
  </div>

  <div class="container">
    <div class="two-columns">
      <!-- Formulario -->
      <div class="form-card">
        <div class="card-header">
          <i class="fas fa-envelope header-icon"></i>
          <h3>Nuevo Reclamo / Sugerencia</h3>
        </div>

        <div class="card-body">
          <div class="form-group">
            <label for="ru"
              ><i class="fas fa-qrcode"></i> RU del Estudiante</label
            >
            <input
              type="text"
              id="ru"
              class="form-control"
              [(ngModel)]="nuevoReclamo.ru"
              placeholder="Ej: RU-8821"
            />
          </div>

          <div class="form-group">
            <label for="asunto"><i class="fas fa-tag"></i> Asunto</label>
            <input
              type="text"
              id="asunto"
              class="form-control"
              [(ngModel)]="nuevoReclamo.asunto"
              placeholder="Resumen del reclamo"
            />
          </div>

          <div class="form-group">
            <label for="detalle"
              ><i class="fas fa-pencil-alt"></i> Detalle del Reclamo</label
            >
            <textarea
              id="detalle"
              class="form-control"
              rows="5"
              [(ngModel)]="nuevoReclamo.detalle"
              placeholder="Describa detalladamente su reclamo o sugerencia..."
            ></textarea>
          </div>

          <button
            class="btn-submit"
            (click)="enviarReclamo()"
            [disabled]="loading"
          >
            <i
              class="fas"
              [class.fa-paper-plane]="!loading"
              [class.fa-spinner]="loading"
              [class.fa-spin]="loading"
            ></i>
            {{ loading ? "Enviando..." : "Enviar Reclamo" }}
          </button>
        </div>
      </div>

      <!-- Lista de reclamos (solo visible para admin) -->
      <div class="list-card" *ngIf="esAdmin()">
        <div class="card-header">
          <i class="fas fa-list header-icon"></i>
          <h3>Reclamos Recibidos</h3>
          <span class="badge"
            ><i class="fas fa-clock"></i> {{ reclamos.length }} pendientes</span
          >
        </div>

        <div class="card-body reclamos-list">
          <div *ngIf="reclamos.length === 0" class="empty-list">
            <i class="fas fa-inbox fa-3x"></i>
            <p>No hay reclamos registrados</p>
          </div>

          <div *ngFor="let reclamo of reclamos" class="reclamo-item">
            <div class="reclamo-header">
              <div class="reclamo-info">
                <strong
                  ><i class="fas fa-qrcode"></i> RU: {{ reclamo.ru }}</strong
                >
                <span class="asunto"
                  ><i class="fas fa-tag"></i> {{ reclamo.asunto }}</span
                >
              </div>
              <span class="date"
                ><i class="fas fa-calendar-day"></i>
                {{ reclamo.fecha | date: "dd/MM/yyyy" }}</span
              >
            </div>
            <div class="reclamo-detalle" [innerHTML]="reclamo.detalle"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
